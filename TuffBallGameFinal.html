<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ball Scene</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #hud {
            position: fixed; top: 16px; left: 16px; color: #fff;
            font-family: monospace; font-size: 13px; opacity: 0.7; z-index: 10;
        }
        #hud input[type=range] { vertical-align: middle; width: 100px; cursor: pointer; }
        #combo-display {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; font-family: monospace; color: #fff; z-index: 10;
            pointer-events: none;
        }
        #combo-num {
            font-size: 80px; font-weight: bold; line-height: 1;
            text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 0 60px rgba(255,255,255,0.1);
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s;
        }
        #combo-num.pop { transform: scale(1.3); }
        #combo-label { font-size: 16px; opacity: 0.5; letter-spacing: 6px; margin-top: 4px; }
        #level-title {
            font-size: 18px; margin-top: 6px; letter-spacing: 3px;
            transition: color 0.5s, text-shadow 0.5s;
            opacity: 0.8;
        }
        #combo-streak {
            font-size: 15px; opacity: 0; margin-top: 4px;
            transition: opacity 0.3s;
        }
        #distance-display {
            position: fixed; bottom: 16px; right: 16px;
            font-family: monospace; font-size: 14px; color: #fff; opacity: 0.6; z-index: 10;
        }
        #feedback-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: monospace; font-size: 48px; font-weight: bold;
            pointer-events: none; z-index: 15; opacity: 0;
            transition: none; text-shadow: 0 0 20px currentColor;
        }
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 25; background: rgba(5,5,16,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
        #start-screen .title {
            font-family: monospace; font-size: 52px; font-weight: bold; color: #fff;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
            margin-bottom: 30px;
        }
        #start-screen .settings {
            font-family: monospace; font-size: 15px; color: #aaa;
            text-align: center; margin-bottom: 30px;
        }
        #start-screen .settings label { display: block; margin: 10px 0; }
        #start-screen .settings input[type=range] { width: 180px; vertical-align: middle; cursor: pointer; }
        #start-screen .settings span { color: #fff; }
        #start-screen .click-msg {
            font-family: monospace; font-size: 20px; color: #66bbff;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
        #game-over {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; background: rgba(0,0,0,0.7);
            flex-direction: column; align-items: center; justify-content: center;
        }
        #game-over .title {
            color: #ff4455; font-family: monospace; font-size: 64px; font-weight: bold;
            text-shadow: 0 0 30px #ff4455, 0 0 60px #ff0000;
        }
        #game-over .sub {
            color: #aaa; font-family: monospace; font-size: 18px; margin-top: 10px;
        }
        #game-over .stats {
            color: #fff; font-family: monospace; font-size: 16px; margin-top: 20px; opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <div class="title">COLOR BOUNCE</div>
        <div class="settings" onclick="event.stopPropagation()">
            <label>Game Speed: <input type="range" id="gamespeed-slider" min="0.5" max="1.5" step="0.1" value="1.0" oninput="document.getElementById('gamespeed-val').textContent=parseFloat(this.value).toFixed(1)+'x'"> <span id="gamespeed-val">1.0x</span></label>
            <label>Move Speed: <input type="range" id="start-movespeed" min="1" max="20" step="1" value="8" oninput="document.getElementById('start-movespeed-val').textContent=this.value"> <span id="start-movespeed-val">8</span></label>
        </div>
        <div id="start-best" style="font-family:monospace;font-size:14px;color:#ffaa00;margin-top:15px;opacity:0.8;"></div>
        <button id="start-btn" style="cursor:pointer;padding:15px 40px;border:2px solid #66bbff;background:transparent;color:#66bbff;font-family:monospace;font-size:20px;margin-top:10px;animation:pulse 1.5s infinite;">Click to Start</button>
    </div>
    <div id="hud">
        Move: Mouse / Arrow Keys / A,D<br>
        Move Speed: <input type="range" id="speed-slider" min="1" max="20" step="1" value="8"> <span id="speed-val">8</span>
    </div>
    <div id="combo-display">
        <div id="combo-num">0</div>
        <div id="combo-label">COMBO</div>
        <div id="level-title">WARM UP</div>
        <div id="combo-streak"></div>
    </div>
    <div id="distance-display">Distance: <span id="dist-val">0</span>m</div>
    <div id="feedback-text"></div>
    <div id="game-over">
        <div class="title">GAME OVER</div>
        <div class="stats" id="final-stats"></div>
        <div id="new-record" style="display:none;color:#ffaa00;font-family:monospace;font-size:22px;font-weight:bold;margin-top:12px;text-shadow:0 0 15px #ffaa00;">NEW BEST RECORD!</div>
        <div class="stats" id="best-record-display" style="margin-top:8px;"></div>
        <div class="sub">Click to restart</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.Fog(0x050510, 15, 55);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 6);
        camera.lookAt(0, -0.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0x606080, 1.0));
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
        mainLight.position.set(5, 8, 5);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);
        const pointLight1 = new THREE.PointLight(0xff6b6b, 0.8, 20);
        pointLight1.position.set(-3, 3, 2);
        scene.add(pointLight1);
        const pointLight2 = new THREE.PointLight(0x4ecdc4, 0.8, 20);
        pointLight2.position.set(3, 2, -2);
        scene.add(pointLight2);

        // ========== AUDIO (Web Audio API — procedural) ==========
        let audioCtx = null;
        function ensureAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function playBounce() {
            const ctx = ensureAudio();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(320, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.25, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
            osc.connect(gain).connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.15);
        }

        function playColorChange() {
            const ctx = ensureAudio();
            const t = ctx.currentTime;
            // Rising shimmer: two detuned oscillators
            [0, 0.06].forEach((delay, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400 + i * 50, t + delay);
                osc.frequency.exponentialRampToValueAtTime(900 + i * 80, t + delay + 0.2);
                gain.gain.setValueAtTime(0.18, t + delay);
                gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.3);
                osc.connect(gain).connect(ctx.destination);
                osc.start(t + delay); osc.stop(t + delay + 0.3);
            });
            // Sparkle noise burst
            const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
            const noise = ctx.createBufferSource();
            noise.buffer = buf;
            const nGain = ctx.createGain();
            nGain.gain.setValueAtTime(0.12, t);
            nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
            const filter = ctx.createBiquadFilter();
            filter.type = 'bandpass'; filter.frequency.value = 4000; filter.Q.value = 2;
            noise.connect(filter).connect(nGain).connect(ctx.destination);
            noise.start(t); noise.stop(t + 0.1);
        }

        function playDeath() {
            const ctx = ensureAudio();
            const t = ctx.currentTime;
            // Low boom
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, t);
            osc.frequency.exponentialRampToValueAtTime(30, t + 0.5);
            gain.gain.setValueAtTime(0.4, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
            osc.connect(gain).connect(ctx.destination);
            osc.start(); osc.stop(t + 0.6);
            // Noise crash
            const buf = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
            const noise = ctx.createBufferSource();
            noise.buffer = buf;
            const nGain = ctx.createGain();
            nGain.gain.setValueAtTime(0.3, t);
            nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
            noise.connect(nGain).connect(ctx.destination);
            noise.start(t); noise.stop(t + 0.5);
        }

        function playLevelUp() {
            const ctx = ensureAudio();
            const t = ctx.currentTime;
            // Ascending arpeggio
            const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
            notes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, t + i * 0.08);
                gain.gain.linearRampToValueAtTime(0.12, t + i * 0.08 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.25);
                osc.connect(gain).connect(ctx.destination);
                osc.start(t + i * 0.08); osc.stop(t + i * 0.08 + 0.25);
            });
        }

        function playComboTick() {
            const ctx = ensureAudio();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'square';
            // Pitch rises with combo
            const pitch = 500 + Math.min(combo * 8, 600);
            osc.frequency.setValueAtTime(pitch, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(pitch * 1.2, ctx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.08, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
            osc.connect(gain).connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.08);
        }

        // ========== BACKGROUND STARS ==========
        const starCount = 500;
        const starGeo = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        const starSizes = new Float32Array(starCount);
        for (let i = 0; i < starCount; i++) {
            starPositions[i * 3] = (Math.random() - 0.5) * 80;
            starPositions[i * 3 + 1] = Math.random() * 40 - 5;
            starPositions[i * 3 + 2] = (Math.random() - 0.5) * 80 - 20;
            starSizes[i] = Math.random() * 2 + 0.5;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
        const starMat = new THREE.PointsMaterial({
            color: 0xffffff, size: 0.08, transparent: true, opacity: 0.6, sizeAttenuation: true
        });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // ========== BALL ==========
        const ballRadius = 0.35;
        const ballGeometry = new THREE.SphereGeometry(ballRadius, 64, 64);
        const ballMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xe63946, metalness: 0.3, roughness: 0.2, clearcoat: 1.0, clearcoatRoughness: 0.1,
        });
        const ball = new THREE.Mesh(ballGeometry, ballMaterial);
        ball.castShadow = true;
        scene.add(ball);

        const floorY = -0.5;
        const groundY = floorY + ballRadius;

        // ========== COLORS ==========
        const PINK = 0xff88cc, YELLOW = 0xffee55, BLUE = 0x66bbff;
        const BALL_COLOR = 0xff4455;
        const allColors = [PINK, YELLOW, BLUE];
        let currentBallColor = BALL_COLOR;

        function makeMat(color) {
            return new THREE.MeshStandardMaterial({ color, metalness: 0.4, roughness: 0.3, emissive: color, emissiveIntensity: 0.15 });
        }
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
            return a;
        }

        // ========== RAIL CONFIG ==========
        const totalWidth = 2.0, panelHeight = 0.3, panelDepth = 0.6, splitGap = 0.25;
        let bounceTime = 1.0;
        const railSpeed = 4;
        let stride = railSpeed * bounceTime;
        const numSegments = 40;
        const railGroups = [];

        // ========== GAME STATE (must be before randomCreator which reads combo) ==========
        let gameStarted = false;

        // ========== BEST RECORD ==========
        let bestCombo = parseInt(localStorage.getItem('cb_bestCombo') || '0');
        let bestDistance = parseFloat(localStorage.getItem('cb_bestDistance') || '0');
        function updateBestDisplay() {
            const startEl = document.getElementById('start-best');
            if (bestCombo > 0) {
                startEl.textContent = `Best: ${bestCombo} combo | ${bestDistance.toFixed(1)}m`;
            } else {
                startEl.textContent = '';
            }
        }
        updateBestDisplay();
        let gameOver = false;
        let combo = 0;
        let totalDistance = 0;
        let ballX = 0;
        let bounceTimer = 0;
        let lastTime = performance.now() * 0.001;
        let gameSpeedMult = 1.0;

        function createBigRect(z) {
            const color = allColors[Math.floor(Math.random() * 3)];
            const geo = new THREE.BoxGeometry(totalWidth, panelHeight, panelDepth);
            const mesh = new THREE.Mesh(geo, makeMat(color));
            mesh.position.set(0, floorY + 0.15, z);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            return { meshes: [mesh], type: 'big', color, colors: [color] };
        }
        function createTwoRects(z) {
            const picked = shuffle(allColors).slice(0, 2);
            picked[Math.floor(Math.random() * 2)] = currentBallColor;
            const halfW = (totalWidth - splitGap) / 2;
            const meshes = [];
            for (let j = 0; j < 2; j++) {
                const geo = new THREE.BoxGeometry(halfW, panelHeight, panelDepth);
                const mesh = new THREE.Mesh(geo, makeMat(picked[j]));
                mesh.position.set(-totalWidth / 2 + halfW / 2 + j * (halfW + splitGap), floorY + 0.15, z);
                mesh.castShadow = true; mesh.receiveShadow = true;
                scene.add(mesh); meshes.push(mesh);
            }
            return { meshes, type: 'two', colors: [...picked] };
        }
        function createThreeSquares(z) {
            const colors = shuffle(allColors);
            colors[Math.floor(Math.random() * 3)] = currentBallColor;
            const squareW = (totalWidth - splitGap * 2) / 3;
            const meshes = [];
            for (let j = 0; j < 3; j++) {
                const geo = new THREE.BoxGeometry(squareW, panelHeight, panelDepth);
                const mesh = new THREE.Mesh(geo, makeMat(colors[j]));
                mesh.position.set(-totalWidth / 2 + squareW / 2 + j * (squareW + splitGap), floorY + 0.15, z);
                mesh.castShadow = true; mesh.receiveShadow = true;
                scene.add(mesh); meshes.push(mesh);
            }
            return { meshes, type: 'three', colors: [...colors] };
        }
        function randomCreator() {
            // Difficulty scales: fewer big panels, more three-splits over time
            const diff = Math.min(combo * 0.012, 0.6);
            const bigChance = Math.max(0.01, 0.10 - diff * 0.15);
            const twoChance = Math.max(0.15, 0.35 - diff * 0.3);
            const r = Math.random();
            if (r < bigChance) return createBigRect;
            if (r < bigChance + twoChance) return createTwoRects;
            return createThreeSquares;
        }
        // Ensure upcoming split panels always have the current ball color
        function fixUpcomingPanels() {
            railGroups.forEach((group) => {
                // Only fix panels ahead of the ball (negative Z = ahead)
                if (group.meshes[0].position.z >= 0) return;
                if (group.type === 'big') return;

                // Check if any sub-panel already matches current ball color
                const hasMatch = group.colors.some(c => c === currentBallColor);
                if (hasMatch) return;

                // Replace a random sub-panel's color with the ball color
                const idx = Math.floor(Math.random() * group.colors.length);
                group.colors[idx] = currentBallColor;
                group.meshes[idx].material.color.setHex(currentBallColor);
                group.meshes[idx].material.emissive.setHex(currentBallColor);
            });
        }

        for (let i = 0; i < numSegments; i++) {
            railGroups.push(randomCreator()(-numSegments * stride / 2 + i * stride));
        }

        // ========== PARTICLES ==========
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.04, 6, 6);

        function spawnParticles(x, y, z, color, count, speed) {
            for (let i = 0; i < count; i++) {
                const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
                const p = new THREE.Mesh(particleGeo, mat);
                p.position.set(x, y, z);
                const angle = Math.random() * Math.PI * 2;
                const elev = (Math.random() - 0.3) * Math.PI;
                const spd = speed * (0.5 + Math.random());
                p.userData = {
                    vx: Math.cos(angle) * Math.cos(elev) * spd,
                    vy: Math.sin(elev) * spd + 2,
                    vz: Math.sin(angle) * Math.cos(elev) * spd,
                    life: 1.0, decay: 0.5 + Math.random() * 0.5
                };
                scene.add(p); particles.push(p);
            }
        }

        // ========== SHOCKWAVE RINGS ==========
        const shockwaves = [];
        function spawnShockwave(x, y, z, color) {
            // Main square wave
            const edges1 = new THREE.EdgesGeometry(new THREE.PlaneGeometry(0.3, 0.3));
            const lineMat1 = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.9 });
            const sq1 = new THREE.LineSegments(edges1, lineMat1);
            sq1.position.set(x, y + 0.02, z);
            sq1.rotation.x = -Math.PI / 2;
            sq1.userData = { life: 1.0, speed: 5.0 };
            scene.add(sq1); shockwaves.push(sq1);

            // Second delayed square
            setTimeout(() => {
                const edges2 = new THREE.EdgesGeometry(new THREE.PlaneGeometry(0.2, 0.2));
                const lineMat2 = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
                const sq2 = new THREE.LineSegments(edges2, lineMat2);
                sq2.position.set(x, y + 0.02, z);
                sq2.rotation.x = -Math.PI / 2;
                sq2.userData = { life: 1.0, speed: 3.5 };
                scene.add(sq2); shockwaves.push(sq2);
            }, 80);

            // Third square
            setTimeout(() => {
                const edges3 = new THREE.EdgesGeometry(new THREE.PlaneGeometry(0.15, 0.15));
                const lineMat3 = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.4 });
                const sq3 = new THREE.LineSegments(edges3, lineMat3);
                sq3.position.set(x, y + 0.02, z);
                sq3.rotation.x = -Math.PI / 2;
                sq3.userData = { life: 1.0, speed: 2.5 };
                scene.add(sq3); shockwaves.push(sq3);
            }, 160);

            // Wave particles — burst outward in square pattern
            for (let i = 0; i < 20; i++) {
                const side = Math.floor(Math.random() * 4);
                let vx, vz;
                const spd = 2.5 + Math.random();
                if (side === 0) { vx = spd; vz = (Math.random() - 0.5) * spd; }
                else if (side === 1) { vx = -spd; vz = (Math.random() - 0.5) * spd; }
                else if (side === 2) { vx = (Math.random() - 0.5) * spd; vz = spd; }
                else { vx = (Math.random() - 0.5) * spd; vz = -spd; }
                const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
                const p = new THREE.Mesh(particleGeo, mat);
                p.position.set(x, y + 0.1, z);
                p.userData = { vx, vy: 0.3 + Math.random() * 0.5, vz, life: 1.0, decay: 1.2 };
                scene.add(p); particles.push(p);
            }
        }

        function updateShockwaves(dt) {
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                const sw = shockwaves[i];
                sw.userData.life -= dt * 1.5;
                const scale = 1 + (1 - sw.userData.life) * sw.userData.speed * 3;
                sw.scale.set(scale, scale, scale);
                sw.material.opacity = Math.max(0, sw.userData.life * 0.8);
                if (sw.userData.life <= 0) {
                    scene.remove(sw);
                    shockwaves.splice(i, 1);
                }
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.x += p.userData.vx * dt;
                p.position.y += p.userData.vy * dt;
                p.position.z += p.userData.vz * dt;
                p.userData.vy -= 5 * dt;
                p.userData.life -= p.userData.decay * dt;
                p.material.opacity = Math.max(0, p.userData.life);
                if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            }
        }

        // (game state moved earlier, before rail init)

        // Start screen slider updates
        document.getElementById('gamespeed-slider').addEventListener('input', (e) => {
            document.getElementById('gamespeed-val').textContent = parseFloat(e.target.value).toFixed(1) + 'x';
        });
        document.getElementById('start-movespeed').addEventListener('input', (e) => {
            document.getElementById('start-movespeed-val').textContent = e.target.value;
        });

        // Start game on button click only
        document.getElementById('start-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            gameSpeedMult = parseFloat(document.getElementById('gamespeed-slider').value);
            moveSpeed = parseFloat(document.getElementById('start-movespeed').value);
            document.getElementById('speed-slider').value = moveSpeed;
            document.getElementById('speed-val').textContent = moveSpeed.toFixed(0);
            bounceTime = 1.0 / gameSpeedMult;
            stride = railSpeed * bounceTime;
            // Rebuild rails with new stride
            railGroups.forEach(g => g.meshes.forEach(m => scene.remove(m)));
            railGroups.length = 0;
            for (let i = 0; i < numSegments; i++) {
                railGroups.push(randomCreator()(-numSegments * stride / 2 + i * stride));
            }
            bounceTimer = 0;
            gameStarted = true;
            document.getElementById('start-screen').style.display = 'none';
        });

        // Feedback text animation
        let feedbackTimer = 0;
        function showFeedback(text, color) {
            const el = document.getElementById('feedback-text');
            el.textContent = text;
            el.style.color = color;
            el.style.opacity = '1';
            el.style.transform = 'translate(-50%, -50%) scale(1.2)';
            feedbackTimer = 0.8;
        }
        function updateFeedback(dt) {
            if (feedbackTimer > 0) {
                feedbackTimer -= dt;
                const el = document.getElementById('feedback-text');
                const t = Math.max(0, feedbackTimer / 0.8);
                el.style.opacity = String(t);
                el.style.transform = `translate(-50%, ${-50 - (1 - t) * 30}%) scale(${1 + (1 - t) * 0.3})`;
            }
        }

        // ========== COMBO EFFECTS ==========
        // Level tiers
        const levels = [
            { at: 0,   name: 'WARM UP',        color: '#aaaaaa', shadow: '' },
            { at: 3,   name: 'GETTING STARTED', color: '#66bbff', shadow: '0 0 15px #66bbff' },
            { at: 8,   name: 'ON FIRE',         color: '#ffee55', shadow: '0 0 20px #ffee55' },
            { at: 15,  name: 'UNSTOPPABLE',     color: '#ffaa00', shadow: '0 0 25px #ffaa00, 0 0 50px #ff6600' },
            { at: 25,  name: 'INSANE',          color: '#ff6644', shadow: '0 0 30px #ff6644, 0 0 60px #ff2200' },
            { at: 35,  name: 'LEGENDARY',       color: '#ff44ff', shadow: '0 0 30px #ff44ff, 0 0 60px #ff00ff' },
            { at: 50,  name: 'GOD MODE',        color: '#ff2222', shadow: '0 0 40px #ff2222, 0 0 80px #ff0000' },
            { at: 70,  name: 'TRANSCENDED',     color: '#ffffff', shadow: '0 0 40px #ffffff, 0 0 80px #aaeeff, 0 0 120px #4488ff' },
        ];

        function getCurrentLevel() {
            let lvl = levels[0];
            for (const l of levels) { if (combo >= l.at) lvl = l; }
            return lvl;
        }

        function popCombo() {
            const el = document.getElementById('combo-num');
            const streak = document.getElementById('combo-streak');
            const lvlEl = document.getElementById('level-title');
            el.classList.remove('pop');
            void el.offsetWidth;
            el.classList.add('pop');
            setTimeout(() => el.classList.remove('pop'), 200);

            const lvl = getCurrentLevel();
            el.style.color = lvl.color;
            el.style.textShadow = lvl.shadow || '0 0 20px rgba(255,255,255,0.3)';
            lvlEl.textContent = lvl.name;
            lvlEl.style.color = lvl.color;
            lvlEl.style.textShadow = lvl.shadow;

            // Milestone flash on level-up
            const isLevelUp = levels.some(l => l.at === combo);
            if (isLevelUp && combo > 0) {
                streak.textContent = lvl.name;
                streak.style.opacity = '1';
                streak.style.color = lvl.color;
                setTimeout(() => streak.style.opacity = '0', 2000);
            }
        }

        // ========== CONTROLS ==========
        let moveSpeed = 8.0;
        const keys = {};
        document.getElementById('speed-slider').addEventListener('input', (e) => {
            moveSpeed = parseFloat(e.target.value);
        });
        document.addEventListener('keydown', (e) => keys[e.key] = true);
        document.addEventListener('keyup', (e) => keys[e.key] = false);

        let mouseControlActive = false, mouseTargetX = 0;
        document.addEventListener('mousemove', (e) => {
            mouseControlActive = true;
            mouseTargetX = (e.clientX / window.innerWidth - 0.5) * totalWidth * 2.5;
        });

        // ========== ANIMATION ==========
        function animate() {
            requestAnimationFrame(animate);
            const t = performance.now() * 0.001;
            const dt = Math.min(t - lastTime, 0.05);
            lastTime = t;

            updateParticles(dt);
            updateShockwaves(dt);
            updateFeedback(dt);

            // Twinkle stars
            starMat.opacity = 0.5 + Math.sin(t * 0.5) * 0.15;

            if (!gameStarted) {
                ball.visible = false;
                renderer.render(scene, camera);
                return;
            }
            ball.visible = true;

            if (gameOver) {
                ball.visible = false;
                document.getElementById('game-over').style.display = 'flex';
                renderer.render(scene, camera);
                return;
            }

            // Progressive difficulty: speed up over time, more three-splits
            // Aggressive speed curve: ramps hard at each tier
            let difficultyRamp;
            if (combo < 8) difficultyRamp = combo * 0.01;           // warm up
            else if (combo < 15) difficultyRamp = 0.08 + (combo - 8) * 0.02;   // on fire
            else if (combo < 25) difficultyRamp = 0.22 + (combo - 15) * 0.03;  // unstoppable
            else if (combo < 35) difficultyRamp = 0.52 + (combo - 25) * 0.04;  // insane
            else if (combo < 50) difficultyRamp = 0.92 + (combo - 35) * 0.04;  // legendary
            else if (combo < 70) difficultyRamp = 1.52 + (combo - 50) * 0.03;  // god mode
            else difficultyRamp = 2.12 + (combo - 70) * 0.025;                 // transcended

            // Player X movement
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) ballX -= moveSpeed * dt;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) ballX += moveSpeed * dt;
            if (mouseControlActive) ballX += (mouseTargetX - ballX) * moveSpeed * dt;
            ballX = Math.max(-totalWidth / 2, Math.min(totalWidth / 2, ballX));

            // Deterministic bounce with difficulty ramp
            const currentBounceTime = bounceTime / (1 + difficultyRamp);
            const currentRailSpeed = railSpeed * (1 + difficultyRamp);
            bounceTimer += dt;
            const progress = (bounceTimer % currentBounceTime) / currentBounceTime;
            const ballY = groundY + Math.sin(progress * Math.PI) * 3.0;

            // Landing
            if (bounceTimer >= currentBounceTime) {
                bounceTimer -= currentBounceTime;
                totalDistance += stride;

                railGroups.forEach((group) => {
                    const panelZ = group.meshes[0].position.z;
                    if (Math.abs(panelZ) < stride / 2) {
                        if (group.type === 'big') {
                            // Color change
                            if (currentBallColor !== group.color) {
                                spawnParticles(ballX, groundY, 0, currentBallColor, 25, 3);
                                spawnParticles(ballX, groundY, 0, group.color, 25, 3);
                                playColorChange();
                            } else {
                                playBounce();
                            }
                            currentBallColor = group.color;
                            ballMaterial.color.setHex(currentBallColor);
                            fixUpcomingPanels();
                            // Big panel is always safe
                            combo++;
                            popCombo();
                            playComboTick();
                            const isLvlUp1 = levels.some(l => l.at === combo && combo > 0);
                            if (isLvlUp1) playLevelUp();
                            spawnShockwave(ballX, floorY + 0.3, 0, currentBallColor);
                            if (Math.random() < 0.2) {
                                showFeedback('Perfect!!', '#ffee55');
                            } else {
                                showFeedback('Great!', '#66bbff');
                            }
                        } else {
                            // Find which sub-panel
                            let landedIdx = 0, closestDist = Infinity;
                            group.meshes.forEach((mesh, idx) => {
                                const dist = Math.abs(mesh.position.x - ballX);
                                if (dist < closestDist) { closestDist = dist; landedIdx = idx; }
                            });
                            const landedColor = group.colors[landedIdx];
                            if (landedColor !== currentBallColor) {
                                // DEATH
                                playDeath();
                                gameOver = true;
                                document.getElementById('final-stats').textContent =
                                    `Combo: ${combo} | Distance: ${totalDistance.toFixed(1)}m`;
                                // Check for new record
                                const isNewBest = combo > bestCombo || (combo === bestCombo && totalDistance > bestDistance);
                                if (isNewBest) {
                                    bestCombo = combo;
                                    bestDistance = totalDistance;
                                    localStorage.setItem('cb_bestCombo', bestCombo);
                                    localStorage.setItem('cb_bestDistance', bestDistance.toFixed(1));
                                    document.getElementById('new-record').style.display = 'block';
                                } else {
                                    document.getElementById('new-record').style.display = 'none';
                                }
                                document.getElementById('best-record-display').textContent =
                                    `Best: ${bestCombo} combo | ${bestDistance.toFixed(1)}m`;
                                spawnParticles(ballX, groundY + 0.5, 0, currentBallColor, 60, 5);
                                spawnParticles(ballX, groundY + 0.5, 0, 0xff0000, 40, 6);
                                spawnParticles(ballX, groundY + 0.5, 0, 0xffffff, 30, 4);
                            } else {
                                // Correct color — combo!
                                playBounce();
                                combo++;
                                popCombo();
                                playComboTick();
                                const isLvlUp2 = levels.some(l => l.at === combo && combo > 0);
                                if (isLvlUp2) playLevelUp();
                                spawnShockwave(ballX, floorY + 0.3, 0, currentBallColor);
                                if (Math.random() < 0.2) {
                                    showFeedback('Perfect!!', '#ffee55');
                                } else {
                                    showFeedback('Great!', '#66bbff');
                                }
                            }
                        }
                    }
                });
            }

            ball.position.x = ballX;
            ball.position.y = ballY;
            ball.rotation.x -= currentRailSpeed * dt * 0.5;

            // Move rails
            const loopLength = numSegments * stride;
            railGroups.forEach((group) => {
                group.meshes.forEach((mesh) => mesh.position.z += currentRailSpeed * dt);
                if (group.meshes[0].position.z > loopLength / 2) {
                    const newZ = group.meshes[0].position.z - loopLength;
                    group.meshes.forEach((m) => scene.remove(m));
                    const newGroup = randomCreator()(newZ);
                    group.meshes = newGroup.meshes;
                    group.type = newGroup.type;
                    group.color = newGroup.color;
                    group.colors = newGroup.colors;
                }
            });

            // Update HUD
            document.getElementById('speed-val').textContent = moveSpeed.toFixed(0);
            document.getElementById('combo-num').textContent = combo;
            document.getElementById('dist-val').textContent = totalDistance.toFixed(1);

            // Animate lights
            pointLight1.position.x = Math.sin(t * 0.7) * 4;
            pointLight1.position.z = Math.cos(t * 0.7) * 4;
            pointLight2.position.x = Math.cos(t * 0.5) * 4;
            pointLight2.position.z = Math.sin(t * 0.5) * 4;

            renderer.render(scene, camera);
        }
        animate();

        // Restart — go back to start screen
        document.getElementById('game-over').addEventListener('click', () => {
            gameOver = false;
            gameStarted = false;
            ball.visible = false;
            updateBestDisplay();
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
            currentBallColor = BALL_COLOR;
            ballMaterial.color.setHex(currentBallColor);
            ballX = 0;
            bounceTimer = 0;
            combo = 0;
            totalDistance = 0;
            // Reset combo display
            const comboEl = document.getElementById('combo-num');
            comboEl.textContent = '0';
            comboEl.style.color = '#fff';
            comboEl.style.textShadow = '0 0 20px rgba(255,255,255,0.3)';
            document.getElementById('level-title').textContent = 'WARM UP';
            document.getElementById('level-title').style.color = '#aaaaaa';
            document.getElementById('level-title').style.textShadow = '';
            document.getElementById('dist-val').textContent = '0';
            particles.forEach(p => scene.remove(p)); particles.length = 0;
            shockwaves.forEach(s => scene.remove(s)); shockwaves.length = 0;
            railGroups.forEach(g => g.meshes.forEach(m => scene.remove(m)));
            railGroups.length = 0;
        });

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

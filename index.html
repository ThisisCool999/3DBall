<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Third Person 3D World</title>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; cursor: none; }
  #overlay {
    position: fixed; top: 20px; left: 20px; color: #fff;
    font: 15px monospace; background: rgba(0,0,0,0.5);
    padding: 12px 16px; border-radius: 8px; pointer-events: none; z-index: 10;
  }
  #start {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; color: #fff; font-family: monospace; z-index: 30; cursor: pointer;
  }
  #start h1 { font-size: 32px; margin-bottom: 12px; }
  #start p { font-size: 16px; color: #aaa; }
</style>
</head>
<body>
<div id="overlay">WASD/Arrows: Move | Mouse: Camera | Space: Jump | Shift: Sprint | Click: Slash</div>
<div id="start"><h1>Third Person World</h1><p>Click to start</p></div>

<script type="importmap">
{ "imports": { "three": "./three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════
// SCENE
// ═══════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ec8e3);
scene.fog = new THREE.Fog(0x7ec8e3, 50, 180);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);
let camDist = 4.5, camAngleX = Math.PI, camAngleY = 0.35;

// Lighting
scene.add(new THREE.AmbientLight(0x99aacc, 0.8));
scene.add(new THREE.HemisphereLight(0x88ccee, 0x445522, 0.6));
const sun = new THREE.DirectionalLight(0xfff0d0, 2.0);
sun.position.set(50, 80, 40); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left=-40;sun.shadow.camera.right=40;sun.shadow.camera.top=40;sun.shadow.camera.bottom=-40;
sun.shadow.bias = -0.001;
scene.add(sun); scene.add(sun.target);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(400, 400),
  new THREE.MeshStandardMaterial({ color: 0x4a8040, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

// Buildings
const bC=[0xcc5544,0x4488bb,0xddaa33,0x77aa55,0x9966cc,0xdd7733,0x5599aa,0x999999];
for(let i=0;i<50;i++){
  const x=(Math.random()-0.5)*180,z=(Math.random()-0.5)*180;
  if(Math.abs(x)<10&&Math.abs(z)<10)continue;
  const w=2+Math.random()*5,h=3+Math.random()*12,d=2+Math.random()*5;
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color:bC[~~(Math.random()*bC.length)],roughness:0.7}));
  m.position.set(x,h/2,z);m.castShadow=true;m.receiveShadow=true;scene.add(m);
}
// Trees
for(let i=0;i<70;i++){
  const x=(Math.random()-0.5)*200,z=(Math.random()-0.5)*200;
  if(Math.abs(x)<8&&Math.abs(z)<8)continue;
  const h=2+Math.random()*2;
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.2,h,6),new THREE.MeshStandardMaterial({color:0x5a3a1a}));
  trunk.position.set(x,h/2,z);trunk.castShadow=true;scene.add(trunk);
  for(let j=0;j<2;j++){
    const r=0.7+Math.random()*0.6;
    const lv=new THREE.Mesh(new THREE.SphereGeometry(r,8,6),new THREE.MeshStandardMaterial({color:0x228833+~~(Math.random()*0x113311)}));
    lv.position.set(x+(Math.random()-0.5)*0.5,h+r*0.3+j*0.5,z+(Math.random()-0.5)*0.5);lv.castShadow=true;scene.add(lv);
  }
}

// ═══════════════════════════════════════
// ANIME CHARACTER (built from geometry — no external model needed)
// ═══════════════════════════════════════
const charGroup = new THREE.Group();
scene.add(charGroup);

// Materials — vibrant anime colors, flat/cartoon look
const mat = {
  skin: new THREE.MeshStandardMaterial({ color: 0xf5c8a0, roughness: 0.8 }),
  hair: new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.7 }),
  jacket: new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.85 }),  // dark navy
  shirt: new THREE.MeshStandardMaterial({ color: 0xe74c3c, roughness: 0.85 }),   // red
  pants: new THREE.MeshStandardMaterial({ color: 0x2ecc71, roughness: 0.85 }),    // green
  boots: new THREE.MeshStandardMaterial({ color: 0xf39c12, roughness: 0.85 }),    // orange
  belt: new THREE.MeshStandardMaterial({ color: 0x8b6914, roughness: 0.7 }),
  eye: new THREE.MeshStandardMaterial({ color: 0x44aaff, roughness: 0.3, emissive: 0x2288cc, emissiveIntensity: 0.3 }),
};

function capsule(r, h, m) {
  const g = new THREE.CapsuleGeometry(r, h, 8, 12);
  return new THREE.Mesh(g, m);
}

// Body parts — all positioned relative to charGroup
// HEAD
const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 10), mat.skin);
head.position.y = 1.62; head.scale.set(1, 1.1, 0.95); head.castShadow = true;
charGroup.add(head);

// Hair
const hair = new THREE.Mesh(new THREE.SphereGeometry(0.17, 12, 10), mat.hair);
hair.position.set(0, 1.68, -0.02); hair.scale.set(1.05, 1.0, 1.1); charGroup.add(hair);
// Hair spikes
for (let i = 0; i < 5; i++) {
  const spike = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.12, 4), mat.hair);
  const a = (i / 5) * Math.PI - 0.3;
  spike.position.set(Math.sin(a) * 0.14, 1.78, -Math.cos(a) * 0.1 - 0.05);
  spike.rotation.set(Math.cos(a) * 0.5, 0, Math.sin(a) * 0.4);
  charGroup.add(spike);
}

// Eyes
for (const side of [-1, 1]) {
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.03, 8, 6), mat.eye);
  eye.position.set(side * 0.06, 1.64, 0.13);
  charGroup.add(eye);
  // White
  const white = new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 6), new THREE.MeshStandardMaterial({ color: 0xffffff }));
  white.position.set(side * 0.06, 1.64, 0.12);
  charGroup.add(white);
}

// TORSO — jacket
const torso = capsule(0.15, 0.3, mat.jacket);
torso.position.y = 1.25; torso.castShadow = true; charGroup.add(torso);

// Shirt visible at collar
const collar = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.06, 8), mat.shirt);
collar.position.y = 1.45; charGroup.add(collar);

// Belt
const belt = new THREE.Mesh(new THREE.CylinderGeometry(0.155, 0.155, 0.04, 10), mat.belt);
belt.position.y = 1.05; charGroup.add(belt);

// HIPS
const hips = capsule(0.13, 0.1, mat.pants);
hips.position.y = 0.95; hips.castShadow = true; charGroup.add(hips);

// ARMS
const armPivots = { l: new THREE.Group(), r: new THREE.Group() };
armPivots.l.position.set(-0.22, 1.38, 0);
armPivots.r.position.set(0.22, 1.38, 0);
charGroup.add(armPivots.l, armPivots.r);

for (const [key, pivot] of Object.entries(armPivots)) {
  // Upper arm
  const upper = capsule(0.05, 0.2, mat.jacket);
  upper.position.y = -0.15; upper.castShadow = true; pivot.add(upper);
  // Forearm
  const forearmPivot = new THREE.Group();
  forearmPivot.position.y = -0.28;
  pivot.add(forearmPivot);
  const forearm = capsule(0.04, 0.18, mat.skin);
  forearm.position.y = -0.12; forearm.castShadow = true; forearmPivot.add(forearm);
  // Hand
  const hand = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 6), mat.skin);
  hand.position.y = -0.24; hand.castShadow = true; forearmPivot.add(hand);
  pivot.forearmPivot = forearmPivot;
}

// LEGS
const legPivots = { l: new THREE.Group(), r: new THREE.Group() };
legPivots.l.position.set(-0.09, 0.9, 0);
legPivots.r.position.set(0.09, 0.9, 0);
charGroup.add(legPivots.l, legPivots.r);

for (const [key, pivot] of Object.entries(legPivots)) {
  // Thigh
  const thigh = capsule(0.065, 0.22, mat.pants);
  thigh.position.y = -0.16; thigh.castShadow = true; pivot.add(thigh);
  // Shin pivot
  const shinPivot = new THREE.Group();
  shinPivot.position.y = -0.32;
  pivot.add(shinPivot);
  const shin = capsule(0.05, 0.22, mat.pants);
  shin.position.y = -0.14; shin.castShadow = true; shinPivot.add(shin);
  // Boot
  const boot = capsule(0.05, 0.08, mat.boots);
  boot.position.y = -0.3; boot.castShadow = true; shinPivot.add(boot);
  // Foot
  const foot = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.04, 0.14), mat.boots);
  foot.position.set(0, -0.36, 0.03); foot.castShadow = true; shinPivot.add(foot);
  pivot.shinPivot = shinPivot;
}

// ═══════════════════════════════════════
// BLADE
// ═══════════════════════════════════════
const bladeGroup = new THREE.Group();

const bladeCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0,0,0), new THREE.Vector3(0,0.55,0.02),
  new THREE.Vector3(0,1.1,0.035), new THREE.Vector3(0,1.5,0.02),
  new THREE.Vector3(0,1.75,0),
]);
const bShape = new THREE.Shape();
bShape.moveTo(0,-0.025); bShape.quadraticCurveTo(0.005,-0.028,0.009,0);
bShape.quadraticCurveTo(0.005,0.028,0,0.025); bShape.quadraticCurveTo(-0.002,0.014,-0.003,0);
bShape.quadraticCurveTo(-0.002,-0.014,0,-0.025);

const bladeMat = new THREE.MeshStandardMaterial({
  color: 0xff1111, roughness: 0.15, metalness: 0.7,
  emissive: 0xff2222, emissiveIntensity: 0.5, transparent: true, opacity: 0.9,
});
bladeGroup.add(new THREE.Mesh(new THREE.ExtrudeGeometry(bShape, {steps:30,extrudePath:bladeCurve,bevelEnabled:false}), bladeMat));
bladeGroup.add(new THREE.Mesh(new THREE.TubeGeometry(bladeCurve,30,0.012,6,false), new THREE.MeshBasicMaterial({color:0xff4444,transparent:true,opacity:0.6})));
bladeGroup.add(new THREE.Mesh(new THREE.TubeGeometry(bladeCurve,30,0.004,4,false), new THREE.MeshBasicMaterial({color:0xffaaaa,transparent:true,opacity:0.8})));

const bladeLight = new THREE.PointLight(0xff3333, 1.5, 4);
bladeLight.position.set(0, 0.9, 0); bladeGroup.add(bladeLight);

// Handle
bladeGroup.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.016,0.02,0.28,8), new THREE.MeshStandardMaterial({color:0x1a1a1a})), {position:new THREE.Vector3(0,-0.14,0)}));
for(let i=0;i<5;i++){const w=new THREE.Mesh(new THREE.TorusGeometry(0.019,0.004,4,8),new THREE.MeshStandardMaterial({color:0xcc2222}));w.position.set(0,-0.04-i*0.045,0);w.rotation.x=Math.PI/2;bladeGroup.add(w);}
bladeGroup.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.045,0.012,8), new THREE.MeshStandardMaterial({color:0xd4a020,metalness:0.4,roughness:0.4})), {position:new THREE.Vector3(0,-0.005,0)}));

// Attach blade to right hand area
armPivots.r.forearmPivot.add(bladeGroup);
bladeGroup.position.set(0, -0.24, 0.05);
bladeGroup.rotation.set(-0.2, 0, 0);

// ═══════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════
const MAX_P = 500;
const pPos=new Float32Array(MAX_P*3),pCol=new Float32Array(MAX_P*3),pSiz=new Float32Array(MAX_P);
const pVel=[],pLife=[];
for(let i=0;i<MAX_P;i++){pPos[i*3+1]=-999;pCol[i*3]=1;pCol[i*3+1]=0.2;pCol[i*3+2]=0.1;pSiz[i]=0;pVel.push(new THREE.Vector3());pLife.push({l:0,m:0});}
const pGeo=new THREE.BufferGeometry();
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
pGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));
pGeo.setAttribute('size',new THREE.BufferAttribute(pSiz,1));
const pTex=(()=>{const c=document.createElement('canvas');c.width=64;c.height=64;const x=c.getContext('2d');const g=x.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.3,'rgba(255,100,50,0.8)');g.addColorStop(0.7,'rgba(255,30,10,0.3)');g.addColorStop(1,'rgba(255,0,0,0)');x.fillStyle=g;x.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);})();
const particles=new THREE.Points(pGeo,new THREE.PointsMaterial({size:0.1,map:pTex,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,sizeAttenuation:true}));
scene.add(particles);
let nextPIdx=0;

function spawnP(pos,count,spread,spd){
  for(let i=0;i<count;i++){
    const idx=nextPIdx%MAX_P;nextPIdx++;
    pPos[idx*3]=pos.x+(Math.random()-0.5)*spread;pPos[idx*3+1]=pos.y+(Math.random()-0.5)*spread;pPos[idx*3+2]=pos.z+(Math.random()-0.5)*spread;
    const s=(0.5+Math.random()*2)*spd;pVel[idx].set((Math.random()-0.5)*s,Math.random()*s*1.5,(Math.random()-0.5)*s);
    const b=0.5+Math.random()*0.5;pCol[idx*3]=b;pCol[idx*3+1]=b*(0.1+Math.random()*0.25);pCol[idx*3+2]=b*0.05;
    pSiz[idx]=0.05+Math.random()*0.12;pLife[idx]={l:0,m:0.3+Math.random()*0.7};
  }
}
function updateP(dt){
  for(let i=0;i<MAX_P;i++){const lt=pLife[i];if(lt.m<=0)continue;lt.l+=dt;if(lt.l>=lt.m){pPos[i*3+1]=-999;pSiz[i]=0;lt.m=0;continue;}pPos[i*3]+=pVel[i].x*dt;pPos[i*3+1]+=pVel[i].y*dt;pPos[i*3+2]+=pVel[i].z*dt;pVel[i].y-=4*dt;pSiz[i]*=(1-dt*2.5);pCol[i*3]*=(1-dt*0.6);pCol[i*3+1]*=(1-dt*2.5);}
  pGeo.attributes.position.needsUpdate=true;pGeo.attributes.color.needsUpdate=true;pGeo.attributes.size.needsUpdate=true;
}

// ═══════════════════════════════════════
// PHANTOM SLASH TRAILS
// ═══════════════════════════════════════
const trails=[];
function createTrail(pos,facing,dir){
  const segs=24,p=[],uv=[],idx=[];
  for(let i=0;i<=segs;i++){const t=i/segs;const a=(t-0.5)*Math.PI*0.9*dir;const iR=0.2,oR=1.6;const h=0.9+Math.sin(t*Math.PI)*0.6;p.push(Math.sin(a)*iR,h,-Math.cos(a)*iR);uv.push(t,0);p.push(Math.sin(a)*oR,h+Math.sin(t*Math.PI)*0.4,-Math.cos(a)*oR);uv.push(t,1);}
  for(let i=0;i<segs;i++){const a=i*2,b=a+1,c=a+2,d=a+3;idx.push(a,b,c,c,b,d);}
  const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.Float32BufferAttribute(p,3));geo.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));geo.setIndex(idx);geo.computeVertexNormals();
  const m=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0xff2222,transparent:true,opacity:0.55,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
  m.position.copy(pos);m.rotation.y=facing;scene.add(m);trails.push({mesh:m,life:0,max:0.9});
  while(trails.length>8){const o=trails.shift();scene.remove(o.mesh);o.mesh.geometry.dispose();o.mesh.material.dispose();}
}
function updateTrails(dt){
  for(let i=trails.length-1;i>=0;i--){const tr=trails[i];tr.life+=dt;const t=tr.life/tr.max;tr.mesh.material.opacity=0.55*(1-t)*(1-t);if(tr.life>=tr.max){scene.remove(tr.mesh);tr.mesh.geometry.dispose();tr.mesh.material.dispose();trails.splice(i,1);}}
}

// ═══════════════════════════════════════
// PLAYER STATE (must be before event handlers)
// ═══════════════════════════════════════
const P={pos:new THREE.Vector3(0,0,0),vel:new THREE.Vector3(),onGround:true,facing:0,speed:4.5,sprintSpeed:9,jumpForce:9};
let jumpPhase='none',landTimer=0,walkCycle=0;

// ═══════════════════════════════════════
// INPUT
// ═══════════════════════════════════════
const keys={};
let pointerLocked=false;
window.addEventListener('keydown',e=>{keys[e.code]=true;});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
document.addEventListener('pointerlockchange',()=>{pointerLocked=!!document.pointerLockElement;});
document.addEventListener('mousemove',e=>{if(!pointerLocked)return;camAngleX-=e.movementX*0.003;camAngleY=Math.max(-0.3,Math.min(1.55,camAngleY+e.movementY*0.003));});
renderer.domElement.addEventListener('wheel',e=>{camDist=Math.max(1.5,Math.min(12,camDist+e.deltaY*0.004));});
renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());

// Global click handler — works on start screen OR canvas
document.addEventListener('click',()=>{
  const s = document.getElementById('start');
  if (s && s.style.display !== 'none') {
    s.style.display = 'none';
    // Small delay so next click hits the canvas
    return;
  }
  if (!pointerLocked) renderer.domElement.requestPointerLock();
});

// Slash
let slashing=false,slashTime=0,slashDir=1;
const SLASH_DUR=0.4;
renderer.domElement.addEventListener('mousedown',e=>{
  if(e.button===0&&!slashing){
    slashing=true;slashTime=0;slashDir*=-1;
    createTrail(P.pos,P.facing,slashDir);
    // Get blade tip world pos
    bladeGroup.updateWorldMatrix(true,false);
    const tip=new THREE.Vector3(0,1.75,0).applyMatrix4(bladeGroup.matrixWorld);
    spawnP(tip,50,0.4,1.8);
  }
});

// (P, jumpPhase, landTimer, walkCycle defined above)

// ═══════════════════════════════════════
// UPDATE LOOP
// ═══════════════════════════════════════
const clock=new THREE.Clock();
const gravity=-26;

function update(){
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.elapsedTime;
  const sprinting=keys['ShiftLeft']||keys['ShiftRight'];
  const speed=sprinting?P.sprintSpeed:P.speed;

  // Movement
  const camFwd=new THREE.Vector3(-Math.sin(camAngleX),0,-Math.cos(camAngleX)).normalize();
  const camRt=new THREE.Vector3(-camFwd.z,0,camFwd.x);
  const mv=new THREE.Vector3();
  if(keys['ArrowUp']||keys['KeyW'])mv.add(camFwd);
  if(keys['ArrowDown']||keys['KeyS'])mv.sub(camFwd);
  if(keys['ArrowRight']||keys['KeyD'])mv.add(camRt);
  if(keys['ArrowLeft']||keys['KeyA'])mv.sub(camRt);
  const isMoving=mv.lengthSq()>0.001;
  if(isMoving)mv.normalize();

  P.vel.x=mv.x*speed; P.vel.z=mv.z*speed;

  // Facing
  if(isMoving){
    const ta=Math.atan2(-mv.x,-mv.z);
    let d=ta-P.facing;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;
    P.facing+=d*Math.min(1,dt*14);
  }

  // Jump
  if(keys['Space']&&P.onGround){P.vel.y=P.jumpForce;P.onGround=false;jumpPhase='ascend';}
  P.vel.y+=gravity*dt;
  P.pos.x+=P.vel.x*dt;P.pos.z+=P.vel.z*dt;P.pos.y+=P.vel.y*dt;
  if(P.pos.y<=0){P.pos.y=0;P.vel.y=0;P.onGround=true;}
  P.pos.x=Math.max(-190,Math.min(190,P.pos.x));P.pos.z=Math.max(-190,Math.min(190,P.pos.z));

  // Jump phases
  if(!P.onGround){
    if(P.vel.y>1)jumpPhase='ascend';else if(P.vel.y>-1)jumpPhase='peak';else jumpPhase='descend';
  }else{
    if(jumpPhase!=='none'&&jumpPhase!=='land'){jumpPhase='land';landTimer=0;}
    if(jumpPhase==='land'){landTimer+=dt;if(landTimer>0.25)jumpPhase='none';}
  }

  // Position character
  charGroup.position.copy(P.pos);
  charGroup.rotation.y=P.facing;

  // ── WALK/RUN ANIMATION (procedural) ──
  const walkSpeed = sprinting ? 14 : 8;
  if(isMoving && P.onGround) walkCycle += dt * walkSpeed;
  const wc = walkCycle;
  const legSwing = isMoving ? Math.sin(wc) * (sprinting ? 0.7 : 0.45) : 0;
  const armSwing = isMoving ? Math.sin(wc) * (sprinting ? 0.8 : 0.5) : 0;
  const bodyBob = isMoving ? Math.abs(Math.sin(wc)) * 0.03 : 0;

  // Legs
  legPivots.l.rotation.x = legSwing;
  legPivots.r.rotation.x = -legSwing;
  // Knee bend on back leg
  legPivots.l.shinPivot.rotation.x = Math.max(0, -legSwing) * 0.8;
  legPivots.r.shinPivot.rotation.x = Math.max(0, legSwing) * 0.8;

  // Arms (opposite to legs)
  if (!slashing) {
    armPivots.r.rotation.x = -armSwing;
    armPivots.l.rotation.x = armSwing;
    armPivots.r.forearmPivot.rotation.x = Math.max(0, armSwing) * 0.5 - 0.1;
    armPivots.l.forearmPivot.rotation.x = Math.max(0, -armSwing) * 0.5 - 0.1;
    armPivots.r.rotation.z = 0;
    armPivots.l.rotation.z = 0;
  }

  // Body bob
  torso.position.y = 1.25 + bodyBob;
  head.position.y = 1.62 + bodyBob;
  hair.position.y = 1.68 + bodyBob;

  // Idle breathing
  if (!isMoving && P.onGround) {
    const breath = Math.sin(t * 2) * 0.01;
    torso.position.y += breath;
    head.position.y += breath;
    armPivots.l.rotation.z = Math.sin(t * 1.5) * 0.03;
    armPivots.r.rotation.z = -Math.sin(t * 1.5) * 0.03;
  }

  // ── JUMP ANIMATION ──
  if (jumpPhase === 'ascend') {
    // Tuck: knees bend, arms go up
    legPivots.l.rotation.x = -0.5; legPivots.r.rotation.x = -0.5;
    legPivots.l.shinPivot.rotation.x = 0.8; legPivots.r.shinPivot.rotation.x = 0.8;
    if (!slashing) {
      armPivots.l.rotation.x = -0.8; armPivots.r.rotation.x = -0.8;
      armPivots.l.rotation.z = -0.4; armPivots.r.rotation.z = 0.4;
    }
    // Squash/stretch
    charGroup.scale.set(0.92, 1.12, 0.92);
  } else if (jumpPhase === 'peak') {
    // Spread out
    legPivots.l.rotation.x = -0.2; legPivots.r.rotation.x = 0.2;
    legPivots.l.shinPivot.rotation.x = 0.3; legPivots.r.shinPivot.rotation.x = 0.3;
    if (!slashing) {
      armPivots.l.rotation.x = -0.3; armPivots.r.rotation.x = -0.3;
      armPivots.l.rotation.z = -0.6; armPivots.r.rotation.z = 0.6;
    }
    charGroup.scale.set(1.02, 0.98, 1.02);
  } else if (jumpPhase === 'descend') {
    // Brace for landing — legs extend down
    legPivots.l.rotation.x = 0.3; legPivots.r.rotation.x = 0.3;
    legPivots.l.shinPivot.rotation.x = 0; legPivots.r.shinPivot.rotation.x = 0;
    if (!slashing) {
      armPivots.l.rotation.x = 0.5; armPivots.r.rotation.x = 0.5;
      armPivots.l.rotation.z = -0.3; armPivots.r.rotation.z = 0.3;
    }
    charGroup.scale.set(0.95, 1.08, 0.95);
  } else if (jumpPhase === 'land') {
    // Squash on impact then spring back
    const lt = landTimer / 0.25;
    const squash = lt < 0.3 ? (1 - lt/0.3) : 0;
    const bounce = Math.sin(lt * Math.PI * 3) * 0.04 * (1-lt);
    charGroup.scale.set(1+0.12*squash, 1-0.18*squash+bounce, 1+0.12*squash);
    legPivots.l.rotation.x = -0.4 * (1-lt); legPivots.r.rotation.x = -0.4 * (1-lt);
    legPivots.l.shinPivot.rotation.x = 0.6*(1-lt); legPivots.r.shinPivot.rotation.x = 0.6*(1-lt);
  } else {
    // Smooth back to normal scale
    charGroup.scale.x += (1-charGroup.scale.x)*0.15;
    charGroup.scale.y += (1-charGroup.scale.y)*0.15;
    charGroup.scale.z += (1-charGroup.scale.z)*0.15;
  }

  // ── SLASH ANIMATION ──
  if (slashing) {
    slashTime += dt;
    const st = slashTime / SLASH_DUR;

    if (st < 1) {
      let shoulderAngle, elbowAngle, wristTilt;
      if (st < 0.15) {
        // Windup
        const w = st / 0.15;
        shoulderAngle = -1.5 * w * slashDir;
        elbowAngle = -1.2 * w;
        wristTilt = -0.5 * w;
      } else if (st < 0.5) {
        // Strike
        const s = (st-0.15)/0.35;
        const e = 1-(1-s)*(1-s);
        shoulderAngle = (-1.5 + 4.0*e) * slashDir;
        elbowAngle = -1.2 + 1.8*e;
        wristTilt = -0.5 + 1.2*e;
      } else {
        // Follow-through
        const f = (st-0.5)/0.5;
        shoulderAngle = (2.5 - 0.8*f) * slashDir;
        elbowAngle = 0.6 - 0.6*f;
        wristTilt = 0.7 - 0.7*f;
      }

      // Apply to right arm
      armPivots.r.rotation.x = -0.8 + wristTilt;
      armPivots.r.rotation.z = shoulderAngle * 0.5;
      armPivots.r.rotation.y = shoulderAngle * 0.3;
      armPivots.r.forearmPivot.rotation.x = elbowAngle;

      // Left arm reacts
      const intensity = Math.sin(st * Math.PI);
      armPivots.l.rotation.x = -0.3 * intensity;
      armPivots.l.rotation.z = 0.2 * intensity * slashDir;

      // Blade glow
      bladeMat.emissiveIntensity = 0.5 + intensity * 2.0;
      bladeLight.intensity = 1.5 + intensity * 6;

      // Particles from blade tip during strike
      if (st > 0.15 && st < 0.7) {
        bladeGroup.updateWorldMatrix(true, false);
        const tip = new THREE.Vector3(0, 1.75, 0).applyMatrix4(bladeGroup.matrixWorld);
        spawnP(tip, 5, 0.18, 1.2);
      }
    } else {
      slashing = false;
      bladeMat.emissiveIntensity = 0.5;
      bladeLight.intensity = 1.5;
    }
  }

  updateP(dt);
  updateTrails(dt);

  // ── CAMERA ──
  const lookAt=new THREE.Vector3(P.pos.x, P.pos.y+1.1, P.pos.z);
  const cx=lookAt.x+Math.sin(camAngleX)*Math.cos(camAngleY)*camDist;
  const cy=lookAt.y+Math.sin(camAngleY)*camDist+1.4;
  const cz=lookAt.z+Math.cos(camAngleX)*Math.cos(camAngleY)*camDist;
  camera.position.lerp(new THREE.Vector3(cx,cy,cz),0.15);
  camera.lookAt(lookAt);

  sun.position.set(P.pos.x+50,80,P.pos.z+40);
  sun.target.position.copy(P.pos);sun.target.updateMatrixWorld();
}

window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
(function animate(){requestAnimationFrame(animate);update();renderer.render(scene,camera);})();
</script>
</body>
</html>
